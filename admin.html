<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login PENDEKAR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="menu-kiri">
        <button class="ikon-menu" onclick="window.location.href='index.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 3L4 9V21H9V14H15V21H20V9L12 3Z"/></svg>
        </button>
        <button class="ikon-menu ikon-aktif" onclick="window.location.href='admin.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z"/></svg>
        </button>
    </div>

    <div class="area-kanan" style="justify-content: center; align-items: center;">
        <div style="display:flex; flex-direction:row; align-items:flex-start; justify-content:center; width:100%; max-width:850px; gap:20px; flex-wrap:wrap;">
        <div class="kotak-form" style="flex:1; min-width:320px; max-width:400px; min-height:560px; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); text-align:center; display:flex; flex-direction:column; justify-content:flex-start; align-items:center;">
            
            <img src="logo.png" style="height:50px; margin-bottom:15px;">
            <h2 style="margin:0 0 5px 0; color:#1a233a;">Login PENDEKAR</h2>
            <p style="color:#888; font-size:13px; margin-bottom:25px;">Masuk sebagai Admin atau Pegawai</p>

            <!-- Tab Pilihan -->
            <div style="display:flex; margin-bottom:25px; border-radius:10px; overflow:hidden; border:1px solid #e2e8f0;">
                <button id="tab-pegawai" onclick="gantiTab('pegawai')" style="flex:1; padding:10px; border:none; background:#28a745; color:white; font-weight:bold; cursor:pointer;">Pegawai</button>
                <button id="tab-admin" onclick="gantiTab('admin')" style="flex:1; padding:10px; border:none; background:#f7f9fc; color:#666; font-weight:bold; cursor:pointer;">Admin</button>
            </div>

            <!-- Form Pegawai -->
            <div id="form-pegawai" style="width:100%;">
                <input type="text" id="pegawai-nip" placeholder="NIP 9 digit" onkeydown="if(event.key==='Enter') loginPegawai()" style="width:90%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; display:block; margin-left:auto; margin-right:auto;">
                <div style="position:relative; width:90%; margin-left:auto; margin-right:auto;">
                    <input type="password" id="pegawai-password" placeholder="Password (default: oke123456)" onkeydown="if(event.key==='Enter') loginPegawai()" style="width:100%; padding:12px; padding-right:40px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                    <span onclick="toggleMata('pegawai-password', this)" style="position:absolute; right:12px; top:12px; cursor:pointer; user-select:none; color:#888;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </span>
                </div>
                <button onclick="loginPegawai()" style="background:#28a745; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">Masuk sebagai Pegawai</button>

                <p style="margin:12px 0 0 0; text-align:right;">
                    <a href="#" onclick="toggleLupaPassword(); return false;" style="color:#28a745; font-size:12px; text-decoration:underline;">Lupa password?</a>
                </p>
            </div>

            <!-- Form Admin -->
            <div id="form-admin" style="display:none; width:100%;">
                <input type="text" id="admin-username" placeholder="Username" onkeydown="if(event.key==='Enter') loginAdmin()" style="width:90%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; display:block; margin-left:auto; margin-right:auto;">
                <div style="position:relative; width:90%; margin-left:auto; margin-right:auto;">
                    <input type="password" id="admin-password" placeholder="Password" onkeydown="if(event.key==='Enter') loginAdmin()" style="width:100%; padding:12px; padding-right:40px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                    <span onclick="toggleMata('admin-password', this)" style="position:absolute; right:12px; top:12px; cursor:pointer; user-select:none; color:#888;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </span>
                </div>
                <button onclick="loginAdmin()" style="background:#2b6cb0; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">Masuk sebagai Admin</button>
                <p style="margin:12px 0 0 0; height:17px;"></p>
            </div>

            <p id="pesan-login" style="font-size:13px; color:#dc3545; font-weight:bold; margin-top:15px;"></p>
        </div>

        <div id="kotak-lupa-password" style="display:none; flex:1; min-width:320px; max-width:400px; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); text-align:center;">
            <h2 style="margin:0 0 5px 0; color:#1a233a; font-size:18px;">Lupa Password</h2>
            <p style="color:#888; font-size:13px; margin-bottom:25px;">Ajukan permintaan ubah password</p>

            <input type="text" id="lupa-nip" placeholder="NIP 9 digit" style="width:90%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; display:block; margin-left:auto; margin-right:auto;">
            <div style="position:relative; width:90%; margin-left:auto; margin-right:auto;">
                <input type="password" id="lupa-password-baru" placeholder="Password baru" onkeydown="if(event.key==='Enter') kirimPermintaanReset()" style="width:100%; padding:12px; padding-right:40px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <span onclick="toggleMata('lupa-password-baru', this)" style="position:absolute; right:12px; top:12px; cursor:pointer; user-select:none; color:#888;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
            </div>
            <button onclick="kirimPermintaanReset()" style="background:#e67e22; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">Kirim Permintaan Ubah Password</button>
            <p id="pesan-lupa" style="font-size:12px; color:#888; margin-top:15px; line-height:1.5;"></p>
        </div>
        </div>
    </div>

    <script>
        const _URL = 'https://gnytuyapiiickrieoboh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueXR1eWFwaWlpY2tyaWVvYm9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDAzMzksImV4cCI6MjA5NzMxNjMzOX0.-oa4YA-U8TDzWfrSHd9EkbnLNB8IyObFw0SziIkIpQo';
        const db = window.supabase.createClient(_URL, _KEY);

        // Toggle tampil/sembunyi password
        function toggleMata(idInput, ikon) {
            const input = document.getElementById(idInput);
            if (input.type === 'password') {
                input.type = 'text';
                ikon.style.color = '#2b6cb0';
            } else {
                input.type = 'password';
                ikon.style.color = '#888';
            }
        }

        function gantiTab(tab) {
            if (tab === 'admin') {
                document.getElementById('form-admin').style.display = 'block';
                document.getElementById('form-pegawai').style.display = 'none';
                document.getElementById('tab-admin').style.background = '#2b6cb0';
                document.getElementById('tab-admin').style.color = 'white';
                document.getElementById('tab-pegawai').style.background = '#f7f9fc';
                document.getElementById('tab-pegawai').style.color = '#666';
            } else {
                document.getElementById('form-admin').style.display = 'none';
                document.getElementById('form-pegawai').style.display = 'block';
                document.getElementById('tab-pegawai').style.background = '#28a745';
                document.getElementById('tab-pegawai').style.color = 'white';
                document.getElementById('tab-admin').style.background = '#f7f9fc';
                document.getElementById('tab-admin').style.color = '#666';
            }
            document.getElementById('pesan-login').innerText = '';
        }

        async function loginAdmin() {
            let username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const pesan = document.getElementById('pesan-login');

            if (!username || !password) {
                pesan.innerText = "Username dan password tidak boleh kosong.";
                return;
            }
            if (username.toLowerCase() === 'admin') username = 'admin@pendekar.com';

            pesan.style.color = '#2b6cb0';
            pesan.innerText = "Memeriksa...";

            const { data, error } = await db.auth.signInWithPassword({ email: username, password });
            if (error) {
                pesan.style.color = '#dc3545';
                pesan.innerText = "Gagal: " + error.message;
            } else {
                window.location.href = 'admin-panel.html';
            }
        }

        function toggleLupaPassword() {
            const form = document.getElementById('kotak-lupa-password');
            form.style.display = (form.style.display === 'none' || form.style.display === '') ? 'block' : 'none';
            document.getElementById('pesan-lupa').innerText = '';
        }

        async function kirimPermintaanReset() {
            const nip = document.getElementById('lupa-nip').value.trim();
            const passwordBaru = document.getElementById('lupa-password-baru').value;
            const pesan = document.getElementById('pesan-lupa');

            if (!nip || !passwordBaru) {
                pesan.style.color = '#dc3545';
                pesan.innerText = "NIP dan password baru tidak boleh kosong.";
                return;
            }

            pesan.style.color = '#2b6cb0';
            pesan.innerText = "Memeriksa NIP...";

            const { data: pegawai } = await db.from('pegawai').select('nip,nama').eq('nip', nip).single();

            if (!pegawai) {
                pesan.style.color = '#dc3545';
                pesan.innerText = "NIP tidak ditemukan.";
                return;
            }

            pesan.innerText = "Mengirim permintaan...";

            const { error } = await db.from('reset_password').insert({
                nip: pegawai.nip,
                nama: pegawai.nama,
                password_baru: passwordBaru,
                status: 'pending'
            });

            if (error) {
                pesan.style.color = '#dc3545';
                pesan.innerText = "Gagal mengirim permintaan: " + error.message;
            } else {
                pesan.style.color = '#e67e22';
                pesan.innerHTML = "Permintaan terkirim. Silahkan hubungi admin kepegawaian PENDEKAR1900 untuk accept request ubah password.";
                document.getElementById('lupa-nip').value = '';
                document.getElementById('lupa-password-baru').value = '';
            }
        }

        async function loginPegawai() {
            const nip = document.getElementById('pegawai-nip').value.trim();
            const password = document.getElementById('pegawai-password').value;
            const pesan = document.getElementById('pesan-login');

            if (!nip || !password) {
                pesan.innerText = "NIP dan password tidak boleh kosong.";
                return;
            }

            pesan.style.color = '#2b6cb0';
            pesan.innerText = "Memeriksa...";

            // Cek di tabel pegawai
            const { data, error } = await db
                .from('pegawai')
                .select('*')
                .eq('nip', nip)
                .eq('password', password)
                .single();

            if (error || !data) {
                pesan.style.color = '#dc3545';
                pesan.innerText = "NIP atau password salah.";
            } else {
                // Simpan info pegawai di sessionStorage
                sessionStorage.setItem('pegawai_nip', data.nip);
                sessionStorage.setItem('pegawai_nama', data.nama);
                window.location.href = 'dashboard-pegawai.html';
            }
        }
    </script>
</body>
</html>
