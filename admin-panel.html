<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel PENDEKAR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="menu-kiri">
        <button class="ikon-menu" onclick="window.location.href='index.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 3L4 9V21H9V14H15V21H20V9L12 3Z"/></svg>
        </button>
        <button class="ikon-menu ikon-aktif" onclick="kePanelOrang()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z"/></svg>
        </button>
    </div>

    <div class="area-kanan" style="justify-content: center; align-items: center;">
        <div style="display:flex; flex-direction:row; align-items:flex-start; justify-content:center; width:100%; max-width:1000px; gap:20px; flex-wrap:wrap;">
        
        <div class="kotak-form" style="flex:1; min-width:320px; max-width:550px; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); text-align:center;">
            <h2 style="margin-top:0; color:#1a233a;">Panel Admin</h2>
            <p style="color:#888; font-size:13px; margin-bottom:30px;">Pilih jenis data yang ingin diunggah</p>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button onclick="gantiMode('agregat')" id="btn-agregat" style="flex:1; padding:12px 5px; border:2px solid #2b6cb0; border-radius:12px; background:#2b6cb0; color:white; font-weight:bold; cursor:pointer; font-size:12px;">
                    📊 Agregat<br><span style="font-weight:normal; font-size:10px;">Ringkasan</span>
                </button>
                <button onclick="gantiMode('pegawai')" id="btn-pegawai" style="flex:1; padding:12px 5px; border:2px solid #ddd; border-radius:12px; background:white; color:#666; font-weight:bold; cursor:pointer; font-size:12px;">
                    👤 Per Pegawai<br><span style="font-weight:normal; font-size:10px;">Absen bulanan</span>
                </button>
                <button onclick="gantiMode('struktur')" id="btn-struktur" style="flex:1; padding:12px 5px; border:2px solid #ddd; border-radius:12px; background:white; color:#666; font-weight:bold; cursor:pointer; font-size:12px;">
                    🏢 Daftar Tim<br><span style="font-weight:normal; font-size:10px;">List Tim (1 Kolom)</span>
                </button>
            </div>

            <p style="font-size:12px; color:#555; margin-top:0; margin-bottom:20px;">
                Template excel unggah: <a href="https://s.bps.go.id/Pendekar1900Template" target="_blank" style="color:#2b6cb0; text-decoration:none; font-weight:bold;">s.bps.go.id/Pendekar1900Template</a>
            </p>

            <input type="file" id="file-excel" accept=".xlsx,.xls" style="border:1px solid #ddd; padding:10px; width:90%; border-radius:8px; margin-bottom:20px;">
            
            <button onclick="prosesUpload()" style="background:#28a745; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">Unggah Data</button>
            <p id="status-pesan" style="font-size:14px; margin-top:15px; font-weight:bold;"></p>

            <button onclick="prosesKeluar()" style="background:#dc3545; color:white; padding:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; width:100%; margin-top:20px;">Keluar</button>
        </div>

        <div class="kotak-form" style="flex:1; min-width:320px; max-width:500px; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); text-align:left; display:flex; flex-direction:column; gap:20px;">
            
            <div>
                <h3 style="margin-top:0; color:#1a233a; font-size:16px;">⏳ Persetujuan Klaim Tim</h3>
                <div id="daftar-klaim" style="max-height: 250px; overflow-y: auto; padding-right: 5px;">
                    <p style="color:#999; font-size:13px;">Memuat...</p>
                </div>
            </div>

            <hr style="border: none; border-top: 1px dashed #ddd; margin: 0;">

            <div>
                <h3 style="margin-top:0; color:#1a233a; font-size:16px;">🔑 Permintaan Reset Password</h3>
                <div id="daftar-reset" style="max-height: 200px; overflow-y: auto; padding-right: 5px;">
                    <p style="color:#999; font-size:13px;">Memuat...</p>
                </div>
            </div>

        </div>
        </div>
    </div>

    <script>
        const _URL = 'https://gnytuyapiiickrieoboh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueXR1eWFwaWlpY2tyaWVvYm9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDAzMzksImV4cCI6MjA5NzMxNjMzOX0.-oa4YA-U8TDzWfrSHd9EkbnLNB8IyObFw0SziIkIpQo';
        const db = window.supabase.createClient(_URL, _KEY);

        let modeSaatIni = 'agregat';

        async function cekSesi() {
            const adminViaNip = sessionStorage.getItem('admin_via_nip') === 'ya';
            const nipPegawai = sessionStorage.getItem('pegawai_nip');
            
            if (adminViaNip && nipPegawai) {
                // Login admin via NIP Ketua Kepegawaian — verifikasi ulang klaim
                const { data: klaimCek } = await db.from('pengajuan_tim')
                    .select('tim, jabatan')
                    .eq('nip', nipPegawai)
                    .eq('status', 'approved');
                
                const valid = klaimCek && klaimCek.some(k =>
                    k.jabatan.toLowerCase() === 'ketua' &&
                    k.tim.toLowerCase().includes('kepegawaian')
                );

                if (!valid) { sessionStorage.removeItem('admin_via_nip'); window.location.href = 'admin.html'; return; }
                muatPermintaanReset(); muatKlaimTim();
                return;
            }

            const { data: { session } } = await db.auth.getSession();
            if (!session) window.location.href = 'admin.html';
            else { muatPermintaanReset(); muatKlaimTim(); }
        }
        cekSesi();

        let daftarPermintaan = [];
        async function muatPermintaanReset() {
            const wadah = document.getElementById('daftar-reset');
            const { data, error } = await db.from('reset_password').select('*').eq('status', 'pending').order('dibuat_pada', { ascending: false });
            if (error) { wadah.innerHTML = `<p style="color:#dc3545; font-size:13px;">Gagal: ${error.message}</p>`; return; }
            daftarPermintaan = data || [];
            if (daftarPermintaan.length === 0) { wadah.innerHTML = `<p style="color:#999; font-size:13px;">Tidak ada permintaan reset saat ini.</p>`; return; }
            wadah.innerHTML = daftarPermintaan.map((r, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border:1px solid #eee; border-radius:10px; margin-bottom:8px;">
                    <div><b style="font-size:13px;">${r.nama || '-'}</b><br><span style="color:#888; font-size:12px;">NIP: ${r.nip}</span></div>
                    <div style="display:flex; gap:6px;">
                        <button onclick="terimaReset(${i})" style="background:#28a745; color:white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:12px;">✔</button>
                        <button onclick="tolakReset(${i})" style="background:#dc3545; color:white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:12px;">✖</button>
                    </div>
                </div>
            `).join('');
        }

        async function tolakReset(i) {
            const r = daftarPermintaan[i];
            if (!confirm(`Tolak reset dari ${r.nama}?`)) return;
            await db.from('reset_password').update({ status: 'rejected' }).eq('id', r.id);
            muatPermintaanReset();
        }

        async function terimaReset(i) {
            const r = daftarPermintaan[i];
            const { error } = await db.from('pegawai').update({ password: r.password_baru }).eq('nip', r.nip);
            if (error) { alert('Gagal: ' + error.message); return; }
            await db.from('reset_password').update({ status: 'approved' }).eq('id', r.id);
            muatPermintaanReset();
        }

        async function muatKlaimTim() {
            const wadah = document.getElementById('daftar-klaim');
            const { data, error } = await db.from('pengajuan_tim').select('*').eq('status', 'pending');
            if (error) { wadah.innerHTML = `<p style="color:#dc3545; font-size:13px;">Gagal memuat: ${error.message}</p>`; return; }
            if (!data || data.length === 0) { wadah.innerHTML = `<p style="color:#999; font-size:13px;">Tidak ada pengajuan klaim tim.</p>`; return; }
            wadah.innerHTML = data.map(r => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid #eee; border-radius:10px; margin-bottom:8px;">
                    <div style="flex:1;">
                        <b style="font-size:12px; color:#1a233a;">${r.nama}</b><br>
                        <span style="font-size:11px; color:#888;">NIP: ${r.nip}</span><br>
                        <span style="font-size:11px; color:#888;">Klaim: <b>${r.tim}</b> (<span style="color:#2b6cb0;">${r.jabatan}</span>)</span>
                    </div>
                    <div style="display:flex; gap:4px;">
                        <button onclick="aksiKlaim(${r.id}, 'approved')" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px;">✔</button>
                        <button onclick="aksiKlaim(${r.id}, 'rejected')" style="background:#dc3545; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px;">✖</button>
                    </div>
                </div>
            `).join('');
        }

        async function aksiKlaim(id, status) {
            await db.from('pengajuan_tim').update({ status: status }).eq('id', id);
            muatKlaimTim();
        }

        async function kePanelOrang() {
            if (sessionStorage.getItem('pegawai_nip')) { window.location.href = 'dashboard-pegawai.html'; return; }
            const { data: { session } } = await db.auth.getSession();
            window.location.href = session ? 'admin-panel.html' : 'admin.html';
        }

        // Label info user yang sedang login
        (function tampilkanUserInfo() {
            const nip = sessionStorage.getItem('pegawai_nip');
            const nama = sessionStorage.getItem('pegawai_nama');
            if (nip && nama) {
                const info = document.createElement('p');
                info.style.cssText = 'font-size:12px; color:#888; text-align:center; margin:5px 0 0 0;';
                info.innerText = nama + ' (' + nip + ')';
                const judul = document.querySelector('.kotak-form h2');
                if (judul) judul.after(info);
            }
        })();

        function gantiMode(mode) {
            modeSaatIni = mode;
            const bA = document.getElementById('btn-agregat');
            const bP = document.getElementById('btn-pegawai');
            const bS = document.getElementById('btn-struktur');
            
            [bA, bP, bS].forEach(b => { b.style.background = 'white'; b.style.color = '#666'; b.style.borderColor = '#ddd'; });

            if (mode === 'agregat') { bA.style.background = '#2b6cb0'; bA.style.color = 'white'; bA.style.borderColor = '#2b6cb0'; }
            else if (mode === 'pegawai') { bP.style.background = '#28a745'; bP.style.color = 'white'; bP.style.borderColor = '#28a745'; }
            else if (mode === 'struktur') { bS.style.background = '#e67e22'; bS.style.color = 'white'; bS.style.borderColor = '#e67e22'; }
            
            document.getElementById('status-pesan').innerText = '';
        }

        async function prosesUpload() {
            const fileInput = document.getElementById('file-excel');
            const statusPesan = document.getElementById('status-pesan');

            if (fileInput.files.length === 0) { statusPesan.style.color = '#dc3545'; statusPesan.innerText = "Pilih file Excel terlebih dahulu."; return; }
            statusPesan.style.color = '#2b6cb0'; statusPesan.innerText = "Membaca file Excel...";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const dataMentah = XLSX.utils.sheet_to_json(sheet);
                    statusPesan.innerText = "Menyiapkan data...";
                    let dataSiap, error;

                    if (modeSaatIni === 'agregat') {
                        dataSiap = dataMentah.map(b => ({
                            tahun: b['Tahun'], bulan: b['Bulan'], jumlah_pegawai: b['Jumlah Pegawai'] || b['Pegawai'] || null, hari_kerja: b['Hari Kerja'] || null,
                            psw: b['PSW'] || 0, ht: b['HT'] || 0, psw1: b['PSW1'] || b['PSW 1'] || 0, psw2: b['PSW2'] || b['PSW 2'] || 0, psw3: b['PSW3'] || b['PSW 3'] || 0, psw4: b['PSW4'] || b['PSW 4'] || 0,
                            tl1: b['TL1'] || b['TL 1'] || 0, tl2: b['TL2'] || b['TL 2'] || 0, tl3: b['TL3'] || b['TL 3'] || 0, tl4: b['TL4'] || b['TL 4'] || 0
                        })).filter(b => b.tahun && b.bulan && b.bulan.toString().toUpperCase() !== 'JUMLAH');
                        ({ error } = await db.from('absensi').upsert(dataSiap, { onConflict: 'tahun,bulan' }));

                    } else if (modeSaatIni === 'pegawai') {
                        dataSiap = dataMentah.map(b => ({
                            tahun: b['Tahun'], bulan: b['Bulan'], nip: b['NIP'] ? b['NIP'].toString() : null, nama: b['Nama'],
                            hk: b['HK'] || 0, hd: b['HD'] || 0, psw: b['PSW'] || 0, psw1: b['PSW1'] || b['PSW 1'] || 0, psw2: b['PSW2'] || b['PSW 2'] || 0, psw3: b['PSW3'] || b['PSW 3'] || 0, psw4: b['PSW4'] || b['PSW 4'] || 0,
                            ht: b['HT'] || 0, tl1: b['TL1'] || b['TL 1'] || 0, tl2: b['TL2'] || b['TL 2'] || 0, tl3: b['TL3'] || b['TL 3'] || 0, tl4: b['TL4'] || b['TL 4'] || 0
                        })).filter(b => b.tahun && b.bulan && b.nip);
                        ({ error } = await db.from('absensi_pegawai').upsert(dataSiap, { onConflict: 'tahun,bulan,nip' }));
                        
                        if (!error) {
                            const akunBaru = dataSiap.map(d => ({ nip: d.nip, nama: d.nama, password: 'oke123456' }));
                            await db.from('pegawai').upsert(akunBaru, { onConflict: 'nip', ignoreDuplicates: true });
                        }

                    } else if (modeSaatIni === 'struktur') {
                        dataSiap = dataMentah.map(b => ({
                            nama_tim: b['Nama Tim'] || b['Tim'] || b['TIM'] || null
                        })).filter(b => b.nama_tim);

                        // HAPUS SEMUA DAFTAR TIM LAMA TERLEBIH DAHULU (Wipe and Replace)
                        await db.from('daftar_tim').delete().not('nama_tim', 'is', null);

                        // MASUKKAN DAFTAR TIM BARU
                        ({ error } = await db.from('daftar_tim').insert(dataSiap));
                    }

                    if (error) throw error;
                    statusPesan.style.color = '#28a745';
                    statusPesan.innerText = `Berhasil! ${dataSiap.length} baris tersimpan.`;

                } catch (err) {
                    statusPesan.style.color = '#dc3545';
                    statusPesan.innerText = "Gagal: " + err.message;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function prosesKeluar() {
            sessionStorage.removeItem('admin_via_nip');
            sessionStorage.removeItem('pegawai_nip');
            sessionStorage.removeItem('pegawai_nama');
            await db.auth.signOut();
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
