<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard PENDEKAR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="modal-sambutan" class="modal-overlay">
        <div class="modal-box">
            <button class="tombol-close" onclick="tutupModal()">&#10005;</button>
            
            <img src="logo.png" alt="Logo PENDEKAR" style="height: 60px; margin-bottom: 15px;">
            
            <h2 style="margin: 0 0 10px 0; color: #1a233a; font-size: 22px;">Selamat Datang di Dashboard PENDEKAR</h2>
            <p style="margin: 0 0 25px 0; color: #666; font-size: 14px; line-height: 1.6;">
                Peningkatan Disiplin dan Evaluasi Kehadiran melalui Monitoring Absensi Rutin
            </p>
            
            <button class="tombol-masuk-modal" onclick="tutupModal()">Masuk Dashboard</button>
        </div>
    </div>

    <div class="menu-kiri">
        <button class="ikon-menu ikon-aktif" onclick="muatUlangDashboard()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 3L4 9V21H9V14H15V21H20V9L12 3Z"/></svg>
        </button>
        <button class="ikon-menu" onclick="kePanelOrang()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z"/></svg>
        </button>
        <button id="tombol-keluar" class="ikon-menu" onclick="prosesKeluarBeranda()" title="Keluar" style="display:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M16 17V14H9V10H16V7L21 12L16 17ZM14 2C15.1 2 16 2.9 16 4V6H14V4H5V20H14V18H16V20C16 21.1 15.1 22 14 22H5C3.9 22 3 21.1 3 20V4C3 2.9 3.9 2 5 2H14Z"/></svg>
        </button>
    </div>

    <div class="area-kanan" id="wadah-konten"></div>

    <script>
        const _URL = 'https://gnytuyapiiickrieoboh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueXR1eWFwaWlpY2tyaWVvYm9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDAzMzksImV4cCI6MjA5NzMxNjMzOX0.-oa4YA-U8TDzWfrSHd9EkbnLNB8IyObFw0SziIkIpQo';
        const db = window.supabase.createClient(_URL, _KEY);

        // Pintar: arahkan ke panel sesuai siapa yang sedang login
        async function kePanelOrang() {
            if (sessionStorage.getItem('pegawai_nip')) {
                window.location.href = 'dashboard-pegawai.html';
                return;
            }
            const { data: { session } } = await db.auth.getSession();
            window.location.href = session ? 'admin-panel.html' : 'admin.html';
        }

        // Logout universal dari halaman Beranda
        async function prosesKeluarBeranda() {
            sessionStorage.removeItem('pegawai_nip');
            sessionStorage.removeItem('pegawai_nama');
            sessionStorage.removeItem('sudahDisambut');
            await db.auth.signOut();
            window.location.href = 'admin.html';
        }

        function tutupModal() {
            document.getElementById('modal-sambutan').classList.add('modal-sembunyi');
            // Menyimpan ingatan di browser agar tidak muncul lagi saat di-refresh
            sessionStorage.setItem('sudahDisambut', 'ya');
        }

        // Jalankan pengecekan status sambutan dan muat konten
        document.addEventListener('DOMContentLoaded', async () => {
            if (sessionStorage.getItem('sudahDisambut') === 'ya') {
                document.getElementById('modal-sambutan').classList.add('modal-sembunyi');
            }

            // Tampilkan tombol keluar hanya jika sedang login
            const sedangLoginPegawai = sessionStorage.getItem('pegawai_nip');
            const { data: { session } } = await db.auth.getSession();
            if (sedangLoginPegawai || session) {
                document.getElementById('tombol-keluar').style.display = 'flex';
            }
        });

        // Fungsi muat konten dashboard (bisa dipanggil ulang tanpa reload halaman)
        function muatKontenDashboard() {
            fetch('konten-dashboard.html')
                .then(response => response.text())
                .then(data => { 
                    document.getElementById('wadah-konten').innerHTML = data; 
                    
                    // Hapus instance app.js lama jika ada, lalu muat ulang
                    const scriptLama = document.getElementById('script-app');
                    if (scriptLama) scriptLama.remove();

                    const script = document.createElement('script');
                    script.id = 'script-app';
                    script.src = 'app.js?v=' + new Date().getTime();
                    document.body.appendChild(script);
                })
                .catch(error => console.error('Gagal memuat konten:', error));
        }

        // Tombol beranda: muat ulang konten tanpa reload halaman penuh
        function muatUlangDashboard() {
            muatKontenDashboard();
        }

        // Muat konten saat pertama kali buka
        muatKontenDashboard();
    </script>
</body>
</html>
